apiVersion: apps/v1
kind: Deployment

metadata:
  name: analytics

spec:
  replicas: 2

  selector:
    matchLabels:
      app: analytics

  template:
    metadata:
      labels:
        app: analytics

    spec:
      containers:
      - name: analytics

        image: 008266478986.dkr.ecr.us-east-1.amazonaws.com/toggle-master-repo-4:latest

        ports:
        - containerPort: 8084
